class_path: mmp.models.custom.quantile_ensemble.QuantileRegressorEnsemble
description: Quantile Regression Ensemble using multiple gradient boosting models.
library: mmp-custom
hyperparameters:
  fixed:
    base_class_path: lightgbm.LGBMRegressor
    quantiles:
    - 0.5
    - 0.75
    - 0.95
    - 0.99
  tunable:
    num_leaves:
      type: int
      range:
      - 10
      - 300
      default: 31
    max_depth:
      type: int
      range:
      - 3
      - 15
      default: -1
    learning_rate:
      type: float
      range:
      - 0.01
      - 0.3
      default: 0.1
    n_estimators:
      type: int
      range:
      - 50
      - 1000
      default: 100
    subsample:
      type: float
      range:
      - 0.5
      - 1.0
      default: 1.0
    colsample_bytree:
      type: float
      range:
      - 0.5
      - 1.0
      default: 1.0
    reg_alpha:
      type: float
      range:
      - 0.0
      - 10.0
      default: 0.0
    reg_lambda:
      type: float
      range:
      - 0.0
      - 10.0
      default: 0.0
    min_child_samples:
      type: int
      range:
      - 5
      - 100
      default: 20
feature_requirements:
  numerical: true
  categorical: true
  text: false
data_handler: tabular
recommended_preprocessor:
  - type: simple_imputer
    strategy: median
  - type: catboost_encoder
